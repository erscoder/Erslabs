<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Thick broken ring with gap at upper-right -->
  <g fill="none" stroke="url(#g)" stroke-linecap="round">
    <!-- Main arc (most of the circle, ~300 degrees) -->
    <path d="M 72 24 A 32 32 0 1 1 76 36" stroke-width="8"/>
  </g>
  <!-- Beam shooting out from gap -->
  <g stroke="#06B6D4" stroke-linecap="round">
    <line x1="76" y1="28" x2="90" y2="14" stroke-width="4"/>
    <line x1="78" y1="24" x2="94" y2="10" stroke-width="2.5" opacity="0.4"/>
    <line x1="74" y1="22" x2="86" y2="8" stroke-width="2" opacity="0.2"/>
  </g>
  <!-- Accent dot at beam tip -->
  <circle cx="90" cy="14" r="3" fill="#06B6D4"/>
</svg>
