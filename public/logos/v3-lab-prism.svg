    <circle cx="50" cy="42" r="4.5"/>
    <circle cx="40" cy="60" r="4"/>
    <circle cx="60" cy="60" r="4"/>
    <!-- Extra connections -->
    <line x1="50" y1="42" x2="50" y2="30" stroke-width="2"/>
    <circle cx="50" cy="30" r="2.5"/>
    <line x1="40" y1="60" x2="32" y2="70" stroke-width="2"/>
