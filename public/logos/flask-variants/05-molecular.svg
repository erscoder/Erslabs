<svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Molecular: bubbles as molecule nodes connected by bonds -->
  <g stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Flask outline -->
    <path d="M 42 18 L 66 18 M 46 18 L 46 40 L 22 92 Q 20 100 28 100 L 80 100 Q 88 100 86 92 L 62 40 L 62 18"/>
    <!-- Liquid line -->
    <path d="M 32 70 Q 40 66 54 68 T 76 70" stroke-width="1.2"/>
  </g>
  <!-- Liquid -->
  <path d="M 32 70 Q 40 66 54 68 T 76 70 L 80 92 Q 80 98 74 98 L 34 98 Q 28 98 28 92 Z" fill="#10B981" fill-opacity="0.2"/>
  <!-- ERS inside liquid -->
  <text x="54" y="89" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#10B981" letter-spacing="1.5">ERS</text>
  <!-- Molecule bonds (lines connecting bubbles) -->
  <g stroke="#34D399" stroke-width="1" stroke-opacity="0.5">
    <line x1="40" y1="58" x2="52" y2="46"/>
    <line x1="52" y1="46" x2="48" y2="32"/>
    <line x1="48" y1="32" x2="60" y2="22"/>
    <line x1="60" y1="22" x2="56" y2="8"/>
  </g>
  <!-- Bubbles as molecule nodes -->
  <circle cx="40" cy="58" r="3" fill="#030712" stroke="#10B981" stroke-width="1.8"/>
  <circle cx="52" cy="46" r="2.5" fill="#030712" stroke="#34D399" stroke-width="1.5"/>
  <circle cx="48" cy="32" r="2" fill="#030712" stroke="#22D3EE" stroke-width="1.3"/>
  <circle cx="60" cy="22" r="2.2" fill="#030712" stroke="#34D399" stroke-width="1.3"/>
  <circle cx="56" cy="8" r="1.8" fill="#030712" stroke="#22D3EE" stroke-width="1"/>
  <!-- Labs wordmark -->
  <text x="110" y="74" font-family="Inter, sans-serif" font-size="42" font-weight="400" fill="#F9FAFB" letter-spacing="-1.5">Labs</text>
  <!-- Subscript dot -->
  <circle cx="222" cy="78" r="2.5" fill="#10B981"/>
</svg>
